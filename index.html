<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>投資監控中心</title>
  <style>
    body { font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif; margin: 24px; color:#111; background-color: #f8f7f2; }
    h1 { margin: 0 0 12px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; margin: 10px 0 18px; }
    .btn { display:inline-block; padding:10px 12px; border:1px solid #ddd; border-radius:12px; text-decoration:none; color:#111; }
    .card { border:1px solid #eee; border-radius:16px; padding:14px 16px; margin-top:14px; }
    .muted { color:#666; font-size:14px; }
    ul { margin: 10px 0 0 18px; }
    li { margin: 6px 0; }
    .tag { font-size:12px; padding:2px 8px; border:1px solid #ddd; border-radius:999px; margin-left:8px; color:#444; }
    .pill { font-size:12px; padding:2px 8px; border:1px solid #ddd; border-radius:999px; color:#444; }
    .grid { display:grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 860px) { .grid { grid-template-columns: 1fr 1fr; } }
    code { background:#f7f7f7; padding: 2px 6px; border-radius: 8px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    /* 漲跌顏色 */
    .up { color: #c72515; font-weight: bold; }    /* 漲 = 紅色 */
    .down { color: #059a3c; font-weight: bold; }  /* 跌 = 綠色 */
    /* 期貨選擇權多空顏色 */
    .bullish { color: #004aad; font-weight: bold; }  /* 偏多 = 藍色 */
    .bearish { color: #c72515; font-weight: bold; }  /* 偏空 = 紅色 */
  </style>
</head>
<body>
  <h1>📊 我的投資監控中心</h1>

  <div class="row">
    <a class="btn" href="https://mis23ms.github.io/tw-stock-06/" target="_blank" rel="noopener">股票外資戰報</a>
    <a class="btn" href="https://mis23ms.github.io/tw-stock-futures/" target="_blank" rel="noopener">期貨大額交易人</a>
    <a class="btn" href="https://mis23ms.github.io/tw-stock-options/" target="_blank" rel="noopener">選擇權大額交易人</a>
  </div>

  <div class="grid">
    <div class="card">
      <div class="row" style="align-items:center; margin:0;">
        <h2 style="margin:0;">⚠️ 今日重點</h2>
        <span id="count" class="pill">0</span>
      </div>
      <div id="status" class="muted" style="margin-top:6px;">載入中…</div>
      <ul id="highlights"></ul>
    </div>

    <div class="card">
      <h2 style="margin:0 0 8px;">🕒 最新更新</h2>
      <div id="updatedAt" class="muted">—</div>

      <div class="muted" style="margin-top:10px;">
        各來源更新時間：
        <div id="perSource" class="mono" style="margin-top:6px; line-height:1.7;"></div>
      </div>

      <div class="muted" style="margin-top:10px;">
        資料來源（JSON）：
        <div style="margin-top:6px; line-height:1.7;">
          <div>• <code id="u1"></code></div>
          <div>• <code id="u2"></code></div>
          <div>• <code id="u3"></code></div>
        </div>
      </div>
    </div>
  </div>

<script>
  // 只抓你三個 summary.json（重點都在 highlights 裡）
  const SOURCES = [
    {
      name: "股票外資",
      url: "https://mis23ms.github.io/tw-stock-06/summary.json",
      page: "https://mis23ms.github.io/tw-stock-06/",
    },
    {
      name: "期貨",
      url: "https://mis23ms.github.io/tw-stock-futures/summary.json",
      page: "https://mis23ms.github.io/tw-stock-futures/",
    },
    {
      name: "選擇權",
      url: "https://mis23ms.github.io/tw-stock-options/summary.json",
      page: "https://mis23ms.github.io/tw-stock-options/",
    },
  ];

  const $status = document.getElementById("status");
  const $list = document.getElementById("highlights");
  const $updatedAt = document.getElementById("updatedAt");
  const $count = document.getElementById("count");
  const $perSource = document.getElementById("perSource");

  document.getElementById("u1").textContent = SOURCES[0].url;
  document.getElementById("u2").textContent = SOURCES[1].url;
  document.getElementById("u3").textContent = SOURCES[2].url;

function addItem(text, sourceName, link) {
  const li = document.createElement("li");

  const a = document.createElement("a");
  a.href = link;
  a.target = "_blank";
  a.rel = "noopener";
  a.style.textDecoration = "none";
  a.style.color = "#111";
  
  // ✅ 新版本（部分上色）
  let coloredHTML = text;
  
  // 處理漲跌百分比
  coloredHTML = coloredHTML.replace(/(\+[\d.]+%)/g, '<span class="up">$1</span>');
  coloredHTML = coloredHTML.replace(/(-[\d.]+%)/g, '<span class="down">$1</span>');
  
  // 處理偏多/偏空
  coloredHTML = coloredHTML.replace(/(偏多)/g, '<span class="bullish">$1</span>');
  coloredHTML = coloredHTML.replace(/(偏空)/g, '<span class="bearish">$1</span>');
  
  a.innerHTML = coloredHTML;
  
  a.addEventListener("mouseover", () => a.style.textDecoration = "underline");
  a.addEventListener("mouseout", () => a.style.textDecoration = "none");

  const tag = document.createElement("span");
  tag.className = "tag";
  tag.textContent = sourceName;

  li.appendChild(a);
  li.appendChild(tag);
  $list.appendChild(li);
}

  // summary.json 的標準欄位：updatedAt
  function pickUpdatedAt(j) {
    return (j && (j.updatedAt || j.update_time || j.updateTime || j.generated_at || j.generatedAt)) ? String(
      j.updatedAt || j.update_time || j.updateTime || j.generated_at || j.generatedAt
    ) : "";
  }

  // ✅ 只做一件事：把 highlights 顯示出來
  function extractHighlights(j) {
    const hs = (j && Array.isArray(j.highlights)) ? j.highlights : [];
    if (hs.length) return hs.filter(x => typeof x === "string" && x.trim());

    const err = j?.error || j?.errors;
    if (err) return [`資料來源回報錯誤：${String(err).slice(0, 120)}`];

    if (j && typeof j === "object") {
      const keys = Object.keys(j);
      return [`(找不到 highlights) 欄位：${keys.join(", ")}`];
    }
    return ["資料格式不明"];
  }

  function setPerSourceLine(lines) {
    $perSource.innerHTML = "";
    lines.forEach(t => {
      const div = document.createElement("div");
      div.textContent = t;
      $perSource.appendChild(div);
    });
  }

  async function loadAll() {
    $status.textContent = "載入中…";
    $list.innerHTML = "";
    $count.textContent = "0";
    $updatedAt.textContent = "—";
    setPerSourceLine([]);

    let total = 0;
    let latestTs = "";

    const results = await Promise.allSettled(
      SOURCES.map(async s => {
        const url = s.url + (s.url.includes("?") ? "&" : "?") + "t=" + Date.now(); // 防快取
        const r = await fetch(url, { cache: "no-store" });
        if (!r.ok) throw new Error(`${s.name} 抓取失敗：${r.status} ${r.statusText}`);
        const j = await r.json();
        return { source: s, json: j };
      })
    );

    const perSourceLines = [];

    for (const r of results) {
      if (r.status === "fulfilled") {
        const { source, json } = r.value;

        const ts = pickUpdatedAt(json);
        perSourceLines.push(`${source.name}: ${ts || "NA"}`);
        if (ts && (!latestTs || ts > latestTs)) latestTs = ts;

        const hs = extractHighlights(json);
        hs.forEach(line => {
          addItem(line, source.name, source.page);
          total++;
        });
      } else {
        perSourceLines.push(`(錯誤) ${r.reason?.message || "抓取失敗"}`);
        addItem(r.reason?.message || "抓取失敗", "總覽", "#");
        total++;
      }
    }

    setPerSourceLine(perSourceLines);
    $updatedAt.textContent = latestTs || "—";
    $count.textContent = String(total);
    $status.textContent = total ? `共 ${total} 則` : "目前沒有重點";
  }

  loadAll();
</script>
</body>
</html>
